name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  GCP_REGION: us-central1
  GCP_PROJECT_ID: brave-drive-471109-d9
  SERVICE_NAME: analyzing-llm-rationale
  VERTEX_ENDPOINT_ID: 7325853011580813312

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      gar_image: ${{ steps.gar_tag.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker/${{ env.SERVICE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v5
        with:
          context: .
          target: cpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Capture GAR image tag
        id: gar_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "image=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker/${{ env.SERVICE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ needs.build-and-push.outputs.gar_image }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --timeout 300 \
            --memory 512Mi \
            --update-secrets SCADS_AI_API_KEY=SCADS_AI_API_KEY:latest \
            --set-env-vars MODEL_DEVICE=cpu \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)'

  vertex-ai:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload model to Vertex AI
        run: |
          SCADS_KEY=$(gcloud secrets versions access latest \
            --secret=SCADS_AI_API_KEY \
            --project=${{ env.GCP_PROJECT_ID }})
          echo "::add-mask::$SCADS_KEY"
          gcloud ai models upload \
            --region=${{ env.GCP_REGION }} \
            --display-name=${{ env.SERVICE_NAME }} \
            --container-image-uri="${{ needs.build-and-push.outputs.gar_image }}" \
            --container-health-route=/health \
            --container-predict-route=/vertex-predict \
            --container-ports=8000 \
            --container-env-vars="MODEL_DEVICE=cpu,SCADS_AI_API_KEY=$SCADS_KEY" \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Get latest model ID
        id: model
        run: |
          MODEL_ID=$(gcloud ai models list \
            --region=${{ env.GCP_REGION }} \
            --filter="displayName=${{ env.SERVICE_NAME }}" \
            --sort-by="~createTime" \
            --limit=1 \
            --format='value(name)' \
            --project=${{ env.GCP_PROJECT_ID }} | awk -F/ '{print $NF}')
          echo "id=$MODEL_ID" >> "$GITHUB_OUTPUT"

      - name: Undeploy previous model versions
        continue-on-error: true
        run: |
          DEPLOYED_IDS=$(gcloud ai endpoints describe ${{ env.VERTEX_ENDPOINT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(deployedModels[].id)')
          for ID in $DEPLOYED_IDS; do
            if [[ "$ID" =~ ^[0-9]+$ ]]; then
              gcloud ai endpoints undeploy-model ${{ env.VERTEX_ENDPOINT_ID }} \
                --region=${{ env.GCP_REGION }} \
                --deployed-model-id="$ID" \
                --project=${{ env.GCP_PROJECT_ID }}
            elif [[ -n "$ID" ]]; then
              echo "Skipping non-numeric deployed model id: $ID"
            fi
          done

      - name: Deploy model to Vertex AI endpoint
        run: |
          gcloud ai endpoints deploy-model ${{ env.VERTEX_ENDPOINT_ID }} \
            --region=${{ env.GCP_REGION }} \
            --model=${{ steps.model.outputs.id }} \
            --display-name=${{ env.SERVICE_NAME }} \
            --machine-type=e2-standard-2 \
            --min-replica-count=1 \
            --max-replica-count=1 \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Print Vertex AI endpoint URL
        run: |
          echo "https://${{ env.GCP_REGION }}-aiplatform.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/locations/${{ env.GCP_REGION }}/endpoints/${{ env.VERTEX_ENDPOINT_ID }}:predict"
