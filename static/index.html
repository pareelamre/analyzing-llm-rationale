<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forecasting AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #000000;
      --bg-2:      #0a0a0a;
      --panel:     #050505;
      --card:      #0c0c0c;
      --border:    #1a1a1a;
      --border-2:  #242424;
      --text:      #f4f4f4;
      --text-dim:  #888888;
      --text-mute: #555555;
      --green:     #4ade80;
      --green-soft: rgba(74,222,128,.12);
      --green-glow: rgba(74,222,128,.3);
      --orange:    #ff5a00;
      --orange-soft: rgba(255,90,0,.14);
    }

    * { font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif; }
    h1, .display {
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      letter-spacing: -0.03em; font-weight: 700;
    }
    /* Monospace micro-labels — the Nitro signature */
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      letter-spacing: 0.02em;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      height: 100dvh;
    }

    /* Faint vertical grid lines — Nitro hero motif */
    main.chat-main {
      flex: 1 1 0%; min-width: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
      background-size: 72px 100%;
    }
    #messages { min-height: 0; }

    /* Sidebar */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      width: 264px; flex-shrink: 0;
      display: flex; flex-direction: column; gap: 14px; padding: 14px;
      transition: transform .25s ease;
    }
    @media (max-width: 640px) {
      .sidebar {
        position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: 8px 0 40px rgba(0,0,0,.8); }
    }

    #overlay {
      display: none; position: fixed; inset: 0; z-index: 40;
      background: rgba(0,0,0,.7); backdrop-filter: blur(2px);
    }
    #overlay.show { display: block; }

    /* Message bubbles */
    .msg-user {
      background: #161616; color: var(--text);
      border: 1px solid var(--border-2);
      border-radius: 14px 14px 4px 14px; font-weight: 400;
    }
    .msg-ai {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px 14px 14px 4px;
    }

    /* Send button — green fill, black text */
    .send-btn {
      background: var(--green); color: #000; font-weight: 600;
      transition: box-shadow .2s, transform .05s, opacity .15s;
    }
    .send-btn:hover { box-shadow: 0 0 22px -2px var(--green-glow); }
    .send-btn:active { transform: translateY(1px); }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }

    textarea { resize: none; background: transparent; color: var(--text); }
    textarea:focus { outline: none; }
    textarea::placeholder { color: var(--text-mute); }

    /* Answer badges — YES green, NO orange (both from the palette) */
    .yes-badge {
      background: var(--green); color: #000;
      border: 1px solid var(--green); box-shadow: 0 0 18px -4px var(--green-glow);
    }
    .no-badge {
      background: var(--orange); color: #000;
      border: 1px solid var(--orange); box-shadow: 0 0 18px -4px rgba(255,90,0,.35);
    }
    .conf-bar-fill { background: var(--green); box-shadow: 0 0 12px -2px var(--green-glow); }

    /* Typing indicator */
    .typing span {
      display: inline-block; width: 6px; height: 6px;
      background: var(--green); border-radius: 50%; margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); opacity: .6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .scrollable { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border-2) transparent; }
    .scrollable::-webkit-scrollbar { width: 4px; }
    .scrollable::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    /* Variant select */
    .variant-select {
      background: var(--bg-2); color: var(--text-dim); border: 1px solid var(--border-2);
      border-radius: 8px; padding: 7px 9px; font-size: 12px; width: 100%;
      font-family: 'JetBrains Mono', monospace;
    }
    .variant-select:focus { outline: none; border-color: var(--green); }

    /* Source chips */
    .source-chip {
      background: var(--green-soft); color: var(--green); border: 1px solid rgba(74,222,128,.25);
      border-radius: 6px; padding: 3px 9px; font-size: 11px;
      display: inline-block; margin: 2px; transition: background .12s;
      font-family: 'JetBrains Mono', monospace;
    }
    .source-chip:hover { background: rgba(74,222,128,.2); }

    /* Conversation items */
    .conv-item {
      border-radius: 8px; padding: 9px 11px; font-size: 12px;
      color: var(--text-dim); cursor: pointer; transition: background .1s, color .1s;
      display: flex; align-items: center; gap: 6px;
    }
    .conv-item:hover { background: #121212; color: var(--text); }
    .conv-item.active {
      background: var(--green-soft); color: var(--green);
      box-shadow: inset 2px 0 0 var(--green);
    }
    .conv-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-delete {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 5px;
      color: var(--text-mute); font-size: 15px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .1s, color .1s;
    }
    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: var(--orange); }

    /* Logo mark */
    .logo-dot {
      width: 9px; height: 9px; border-radius: 2px;
      background: var(--green); box-shadow: 0 0 10px -1px var(--green-glow);
      display: inline-block; flex-shrink: 0;
    }

    /* New chat button — green outline */
    .new-chat-btn {
      border: 1px solid rgba(74,222,128,.3); color: var(--green);
      background: var(--green-soft); border-radius: 10px;
      padding: 9px 12px; font-size: 13px; font-weight: 500; width: 100%;
      transition: background .15s, box-shadow .2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .new-chat-btn:hover { background: rgba(74,222,128,.18); box-shadow: 0 0 18px -4px var(--green-glow); }

    /* Input box */
    .input-box {
      background: var(--bg-2); border: 1px solid var(--border-2); border-radius: 14px;
      transition: border-color .15s, box-shadow .2s;
    }
    .input-box:focus-within { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-soft); }

    /* Hamburger */
    .menu-btn {
      display: none; background: none; border: none;
      color: var(--text-dim); cursor: pointer; padding: 4px;
    }
    @media (max-width: 640px) { .menu-btn { display: flex; } }
  </style>
</head>
<body class="flex overflow-hidden text-gray-200">

<!-- Mobile overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- ── Sidebar ── -->
<aside id="sidebar" class="sidebar overflow-hidden">

  <div class="flex items-center gap-2 px-1 py-1">
    <span class="logo-dot"></span>
    <span class="display font-semibold text-white text-sm tracking-wide flex-1">Forecasting AI</span>
    <button class="menu-btn" onclick="closeSidebar()" title="Close">✕</button>
  </div>

  <button class="new-chat-btn" onclick="newConversation()">+ New conversation</button>

  <!-- Conversation list -->
  <div class="flex-1 scrollable flex flex-col gap-1 min-h-0">
    <p class="text-xs text-gray-600 px-1 mb-1">Recent</p>
    <div id="convList"></div>
  </div>

  <!-- Variant selector -->
  <div>
    <p class="text-xs text-gray-500 mb-1 px-1">Prompt variant</p>
    <select id="variantSelect" class="variant-select" onchange="updateVariantDesc()">
      <option value="variant0_neutral_baseline">Baseline</option>
      <option value="variant1_predicted_event">Predicted Event</option>
      <option value="variant2_key_attribute">Key Attribute</option>
      <option value="variant3_reasoning_type">Reasoning Type</option>
      <option value="variant4_credibility">Credibility</option>
      <option value="variant5_key_conditions">Key Conditions</option>
      <option value="variant6_step_by_step_reasoning">Step-by-Step</option>
      <option value="variant7_uncertainty_language">Uncertainty</option>
      <option value="variant8_temporal_anchors">Temporal Anchors</option>
    </select>
    <p id="variantDesc" class="text-xs text-gray-600 mt-1 px-1"></p>
  </div>

  <!-- Model info -->
  <div class="border border-gray-800 rounded-xl p-3 text-xs text-gray-500 space-y-1">
    <div class="flex justify-between"><span>Model</span><span class="text-gray-400">gpt-oss-120b</span></div>
    <div class="flex justify-between"><span>Provider</span><span class="text-gray-400">SCADS AI</span></div>
    <div class="mt-2 pt-2 border-t border-gray-800">
      <a href="/docs" target="_blank" style="color: var(--lime)" class="hover:opacity-80">API docs ↗</a>
    </div>
  </div>

</aside>

<!-- ── Main ── -->
<main class="chat-main flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="flex items-center gap-3 px-4 py-3 border-b border-gray-800 flex-shrink-0">
    <button class="menu-btn" onclick="openSidebar()" title="Menu">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="flex-1 min-w-0">
      <h1 id="chatTitle" class="text-sm font-medium text-white truncate">New conversation</h1>
      <p class="text-xs text-gray-500 hidden sm:block">Ask any binary (yes/no) forecasting question</p>
    </div>
    <div class="flex items-center gap-1.5 text-xs text-gray-500 flex-shrink-0">
      <span class="w-2 h-2 rounded-full inline-block" style="background: var(--lime); box-shadow: 0 0 8px var(--lime-glow)"></span>
      <span class="hidden sm:inline">Live</span>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages" class="scrollable flex-1 px-3 sm:px-4 py-4 sm:py-6 flex flex-col gap-4 sm:gap-6"></div>

  <!-- Input -->
  <div class="border-t border-gray-800 px-3 sm:px-4 py-3 sm:py-4 flex-shrink-0">
    <div class="max-w-2xl mx-auto">
      <div class="input-box flex gap-2 sm:gap-3 items-end p-2 sm:p-3">
        <textarea
          id="questionInput"
          rows="1"
          placeholder="Ask a forecasting question…"
          class="flex-1 bg-transparent text-sm border-none py-1 px-1 text-base"
          style="font-size: 16px;"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>
        <button id="sendBtn" class="send-btn text-white rounded-xl px-3 sm:px-4 py-2 text-sm font-medium flex-shrink-0" onclick="sendQuestion()">
          Send
        </button>
      </div>
      <p class="text-xs text-gray-600 text-center mt-2 hidden sm:block">
        Predictions are probabilistic. Always verify with authoritative sources.
      </p>
    </div>
  </div>

</main>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'forecasting_ai_convs';
const VARIANT_DESCS = {
  variant0_neutral_baseline:       'Neutral control — no extra framing',
  variant1_predicted_event:        'States the concrete predicted event',
  variant2_key_attribute:          'Focuses on time / quantity / actor',
  variant3_reasoning_type:         'Speculation, expert forecast, trend…',
  variant4_credibility:            'Grounds rationale in source scores',
  variant5_key_conditions:         '2–4 conditions that must hold',
  variant6_step_by_step_reasoning: '2–3 numbered reasoning steps',
  variant7_uncertainty_language:   'Requires uncertainty hedging words',
  variant8_temporal_anchors:       'Anchors to relevant dates',
};

// ── State ────────────────────────────────────────────────────────────────────
let store = loadStore();
let activeId = null;

// ── Persistence ──────────────────────────────────────────────────────────────
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { conversations: {} }; }
  catch { return { conversations: {} }; }
}
function saveStore() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch {}
}
function getConv(id) { return store.conversations[id]; }
function upsertConv(id, patch) {
  store.conversations[id] = Object.assign(store.conversations[id] || {}, patch);
  saveStore();
}

// ── Mobile sidebar ────────────────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Conversation management ──────────────────────────────────────────────────
function newConversation() {
  closeSidebar();
  const id = 'conv_' + Date.now();
  upsertConv(id, { id, title: 'New conversation', createdAt: Date.now(), updatedAt: Date.now(), messages: [] });
  activateConv(id);
}

function activateConv(id) {
  closeSidebar();
  activeId = id;
  renderSidebar();
  renderMessages();
  document.getElementById('chatTitle').textContent = getConv(id)?.title || 'New conversation';
}

function deleteConv(id, e) {
  e.stopPropagation();
  delete store.conversations[id];
  saveStore();
  if (activeId === id) {
    const ids = sortedIds();
    if (ids.length) activateConv(ids[0]);
    else newConversation();
  } else { renderSidebar(); }
}

function sortedIds() {
  return Object.keys(store.conversations)
    .sort((a, b) => (store.conversations[b].updatedAt || 0) - (store.conversations[a].updatedAt || 0));
}

function appendMessage(convId, msg) {
  const conv = getConv(convId);
  conv.messages.push(msg);
  conv.updatedAt = Date.now();
  if (conv.messages.filter(m => m.role === 'user').length === 1 && msg.role === 'user') {
    conv.title = msg.content.slice(0, 60) + (msg.content.length > 60 ? '…' : '');
    document.getElementById('chatTitle').textContent = conv.title;
  }
  saveStore();
  renderSidebar();
}

// ── Sidebar rendering ────────────────────────────────────────────────────────
function renderSidebar() {
  const ids = sortedIds();
  const list = document.getElementById('convList');
  list.innerHTML = ids.map(id => {
    const c = store.conversations[id];
    const active = id === activeId ? ' active' : '';
    return `
      <div class="conv-item${active}" onclick="activateConv('${id}')">
        <span class="conv-title">${escHtml(c.title)}</span>
        <span class="conv-delete" onclick="deleteConv('${id}', event)" title="Delete">×</span>
      </div>`;
  }).join('');
}

// ── Message rendering ────────────────────────────────────────────────────────
function renderMessages() {
  const conv = getConv(activeId);
  const el = document.getElementById('messages');
  el.innerHTML = '';

  if (!conv || conv.messages.length === 0) {
    el.innerHTML = `
      <div class="msg-ai max-w-2xl mx-auto w-full p-4 sm:p-5">
        <p class="text-sm text-gray-400 leading-relaxed">
          Hello! I'm a forecasting AI powered by <span style="color: var(--lime)">gpt-oss-120b</span>.
          Ask me any binary (yes/no) question about future events.
        </p>
        <p class="text-xs text-gray-600 mt-3">
          Example: <em>"Will the Federal Reserve cut rates before the end of 2025?"</em>
        </p>
      </div>`;
    return;
  }

  for (const msg of conv.messages) {
    if (msg.role === 'user') el.appendChild(makeUserBubble(msg.content));
    else el.appendChild(makeAIBubble(msg.data, msg.variant));
  }
  scrollBottom();
}

function makeUserBubble(text) {
  const div = document.createElement('div');
  div.className = 'flex justify-end';
  div.innerHTML = `<div class="msg-user max-w-xs sm:max-w-xl px-4 py-3 text-sm text-gray-200">${escHtml(text)}</div>`;
  return div;
}

function makeAIBubble(data, variant) {
  const answer = (data.predicted_answer || '').toUpperCase();
  const isYes  = answer === 'YES';
  const conf   = data.confidence != null ? Math.round(data.confidence * 100) : null;
  const rationale = data.rationale || '';
  const sources   = data.evidence_sources || [];
  const variantLabel = VARIANT_DESCS[variant] || variant || '';

  const confBar = conf != null ? `
    <div class="mt-3">
      <div class="flex justify-between text-xs text-gray-500 mb-1">
        <span>Confidence</span><span class="text-gray-300 font-medium">${conf}%</span>
      </div>
      <div class="w-full bg-gray-800 rounded-full h-1.5">
        <div class="conf-bar-fill h-1.5 rounded-full" style="width:${conf}%"></div>
      </div>
    </div>` : '';

  const sourcesHtml = sources.length ? `
    <div class="mt-4 pt-3 border-t border-gray-800">
      <p class="text-xs text-gray-500 mb-2">Evidence sources</p>
      <div>${sources.map(s =>
        s.url
          ? `<a href="${escHtml(s.url)}" target="_blank" class="source-chip hover:opacity-80">${escHtml(s.source)}</a>`
          : `<span class="source-chip">${escHtml(s.source)}</span>`
      ).join('')}</div>
    </div>` : '';

  const div = document.createElement('div');
  div.className = 'max-w-2xl mx-auto w-full';
  div.innerHTML = `
    <div class="msg-ai p-4 sm:p-5 space-y-3">
      <div class="flex items-center gap-3">
        <span class="${isYes ? 'yes-badge' : 'no-badge'} text-lg font-bold px-4 py-1 rounded-lg">${answer || '?'}</span>
        ${conf != null ? `<span class="text-gray-500 text-sm">${conf}% confidence</span>` : ''}
      </div>
      ${confBar}
      ${rationale ? `
        <div class="pt-2">
          <p class="text-xs text-gray-500 mb-1">Rationale</p>
          <p class="text-sm text-gray-300 leading-relaxed">${escHtml(rationale)}</p>
        </div>` : ''}
      ${sourcesHtml}
      <div class="pt-2 flex items-center gap-2 text-xs text-gray-600">
        <span class="logo-dot" style="width:5px;height:5px"></span>
        gpt-oss-120b · ${escHtml(variantLabel)}
      </div>
    </div>`;
  return div;
}

// ── Send ─────────────────────────────────────────────────────────────────────
async function sendQuestion() {
  const input = document.getElementById('questionInput');
  const question = input.value.trim();
  if (!question || !activeId) return;

  const variant = document.getElementById('variantSelect').value;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMessage(activeId, { role: 'user', content: question });
  document.getElementById('messages').appendChild(makeUserBubble(question));

  const typingEl = addTyping();

  try {
    const resp = await fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, variant }),
    });
    const data = await resp.json();
    typingEl.remove();

    if (!resp.ok) {
      addError(data.detail || 'Server error');
    } else {
      appendMessage(activeId, { role: 'assistant', data, variant, content: data.rationale || '' });
      document.getElementById('messages').appendChild(makeAIBubble(data, variant));
      scrollBottom();
    }
  } catch (err) {
    typingEl.remove();
    addError('Network error: ' + err.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
}
function addTyping() {
  const div = document.createElement('div');
  div.className = 'max-w-2xl mx-auto w-full';
  div.innerHTML = `<div class="msg-ai inline-flex items-center px-5 py-4">
    <div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
  return div;
}
function addError(msg) {
  const div = document.createElement('div');
  div.className = 'max-w-2xl mx-auto w-full';
  div.innerHTML = `<div class="msg-ai border-red-900 p-4 text-sm text-red-400">⚠ ${escHtml(msg)}</div>`;
  document.getElementById('messages').appendChild(div);
  scrollBottom();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
}
function updateVariantDesc() {
  const v = document.getElementById('variantSelect').value;
  document.getElementById('variantDesc').textContent = VARIANT_DESCS[v] || '';
}

// ── Init ─────────────────────────────────────────────────────────────────────
updateVariantDesc();
const ids = sortedIds();
if (ids.length) activateConv(ids[0]);
else newConversation();
</script>
</body>
</html>
